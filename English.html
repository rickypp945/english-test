let questions=[];
let current=0;
let answers=[];
let time=60*60;
let timer=null;
function esc(str){
  return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}
function startExam(){
  const name=document.getElementById("studentName").value.trim();
  if(!name){alert("請先輸入姓名");return}
  questions=shuffle([...bank]).slice(0,50);
  answers=[];
  current=0;
  time=60*60;
  document.getElementById("start").classList.add("hidden");
  document.getElementById("exam").classList.remove("hidden");
  showQuestion();
  timer=setInterval(()=>{
    time--;
    const m=Math.floor(time/60);
    const s=time%60;
    document.getElementById("timer").innerText=`剩餘時間：${m}:${String(s).padStart(2,"0")}`;
    if(time<=0)finish();
  },1000);
}
function showQuestion(){
  const q=questions[current];
  document.getElementById("info").innerText=`第 ${current+1} / ${questions.length} 題`;
  document.getElementById("type").innerHTML=`<span class="badge">${esc(q.type)}</span>`;
  document.getElementById("question").innerText=q.q;
  let html="";
  shuffle([...q.options]).forEach(opt=>{
    html+=`<label class="option"><input type="radio" name="ans" value="${esc(opt)}"> ${esc(opt)}</label>`;
  });
  document.getElementById("options").innerHTML=html;
}
function nextQuestion(){
  const selected=document.querySelector("input[name='ans']:checked");
  answers[current]=selected?selected.value:"未作答";
  current++;
  if(current>=questions.length)finish();
  else showQuestion();
}
function finish(){
  if(timer)clearInterval(timer);
  document.getElementById("exam").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  let correct=0;
  let review="";
  questions.forEach((q,i)=>{
    const user=answers[i]||"未作答";
    if(user===q.answer)correct++;
    else{
      review+=`<div class="review"><b>第${i+1}題｜${esc(q.type)}</b><br>${esc(q.q)}<br>你的答案：${esc(user)}<br>正確答案：<b>${esc(q.answer)}</b></div>`;
    }
  });
  const percent=Math.round(correct/questions.length*100);
  const name=document.getElementById("studentName").value.trim();
  const cls=document.getElementById("studentClass").value.trim();
  document.getElementById("score").innerHTML=`${cls?esc(cls)+"｜":""}${esc(name)}<br>成績：${percent} 分<br>答對：${correct} / ${questions.length} 題`;
  document.getElementById("review").innerHTML=review||`<div class="review ok">太棒了，全部答對！</div>`;
}
