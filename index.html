<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國小五年級英文測驗</title>
<style>
body{font-family:Arial,"Microsoft JhengHei";background:#eef5ff;margin:0;padding:16px}
.card{background:white;border-radius:18px;padding:20px;max-width:760px;margin:auto;box-shadow:0 4px 12px #0002}
h1{text-align:center;color:#1565c0}
button{width:100%;padding:14px;margin-top:12px;font-size:18px;border:0;border-radius:12px;background:#1565c0;color:white}
.option{display:block;background:#f3f6fa;margin:10px 0;padding:12px;border-radius:10px}
.hidden{display:none}
.timer{color:#d32f2f;font-weight:bold}
</style>
</head>
<body>

<div class="card">
<h1>國小五年級英文測驗</h1>

<div id="start">
<p>題庫：100題</p>
<p>每次隨機抽20題</p>
<p>時間限制：20分鐘</p>
<input id="name" placeholder="輸入姓名" style="width:100%;padding:12px;font-size:18px">
<button onclick="startExam()">開始測驗</button>
</div>

<div id="exam" class="hidden">
<p id="info"></p>
<p class="timer" id="timer"></p>
<h2 id="question"></h2>
<div id="options"></div>
<button onclick="nextQuestion()">下一題</button>
</div>

<div id="result" class="hidden">
<h2 id="score"></h2>
<div id="review"></div>
<button onclick="location.reload()">重新測驗</button>
</div>
</div>

<script>
let bank=[];
const words=[
["apple","蘋果"],["banana","香蕉"],["book","書"],["cat","貓"],["dog","狗"],
["school","學校"],["teacher","老師"],["student","學生"],["mother","媽媽"],["father","爸爸"],
["Monday","星期一"],["Sunday","星期日"],["January","一月"],["December","十二月"],["breakfast","早餐"],
["library","圖書館"],["hungry","飢餓的"],["water","水"],["friend","朋友"],["morning","早上"]
];

words.forEach((w,i)=>{
bank.push({q:`What does "${w[0]}" mean?`,o:[w[1],"桌子","椅子","鉛筆"],a:w[1]});
});

const grammar=[
["I ___ a student.","am"],["She ___ my sister.","is"],["They ___ happy.","are"],
["He ___ a dog.","has"],["I ___ two books.","have"],["I can ___.","swim"],
["She likes ___.","apples"],["This is ___ book.","my"],["___ is my father.","He"],
["___ is my mother.","She"]
];

grammar.forEach(g=>{
bank.push({q:g[0],o:[g[1],"is","are","be"],a:g[1]});
});

for(let i=bank.length+1;i<=100;i++){
let n=i%20;
let w=words[n];
bank.push({
q:`Choose the correct meaning: ${w[0]}`,
o:[w[1],"黑色","公園","醫院"],
a:w[1]
});
}

let questions=[],current=0,answers=[],time=1200,timer;

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function startExam(){
if(!document.getElementById("name").value){
alert("請先輸入姓名");
return;
}
questions=shuffle([...bank]).slice(0,20);
answers=[];
document.getElementById("start").classList.add("hidden");
document.getElementById("exam").classList.remove("hidden");
showQuestion();
timer=setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=`剩餘時間：${m}:${s.toString().padStart(2,"0")}`;
if(time<=0)finish();
},1000);
}

function showQuestion(){
let q=questions[current];
document.getElementById("info").innerText=`第 ${current+1} / 20 題`;
document.getElementById("question").innerText=q.q;
let html="";
shuffle([...q.o]).forEach(x=>{
html+=`<label class="option"><input type="radio" name="ans" value="${x}"> ${x}</label>`;
});
document.getElementById("options").innerHTML=html;
}

function nextQuestion(){
let sel=document.querySelector("input[name='ans']:checked");
answers[current]=sel?sel.value:"未作答";
current++;
if(current>=20)finish();
else showQuestion();
}

function finish(){
clearInterval(timer);
let score=0,review="";
questions.forEach((q,i)=>{
if(answers[i]===q.a)score++;
else review+=`<p>第${i+1}題：${q.q}<br>你的答案：${answers[i]||"未作答"}<br>正確答案：${q.a}</p><hr>`;
});
document.getElementById("exam").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("score").innerHTML=`${document.getElementById("name").value} 成績：${score*5} 分<br>答對 ${score} / 20 題`;
document.getElementById("review").innerHTML=review || "全部答對！";
}
</script>

</body>
</html>
