<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>國小五六年級英文聽力測驗</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Microsoft JhengHei",sans-serif;background:#eef6ff;color:#222}
.card{max-width:820px;margin:25px auto;background:white;border-radius:24px;padding:28px;box-shadow:0 6px 20px #0001}
h1{text-align:center;color:#1565c0;font-size:34px}
h2{font-size:26px;line-height:1.5}
input{width:100%;padding:15px;font-size:18px;border-radius:12px;border:1px solid #ccc;margin:8px 0}
button{width:100%;padding:16px;margin-top:12px;font-size:20px;border:0;border-radius:14px;background:#1565c0;color:white;font-weight:bold}
button.secondary{background:#546e7a}
button.sound{background:#ff9800}
.option{display:block;background:#f3f6fa;margin:12px 0;padding:18px;border-radius:16px;font-size:20px}
.option input{width:auto;margin-right:12px}
.hidden{display:none}
.timer{color:#d32f2f;font-weight:bold;font-size:22px}
.tag{display:inline-block;background:#e3f2fd;color:#1565c0;padding:10px 18px;border-radius:999px;font-weight:bold;margin:10px 0}
.review{background:#fff3cd;padding:12px;border-radius:12px;margin:10px 0}
.rank{background:#e8f5e9;padding:12px;border-radius:12px;margin:8px 0;font-size:18px}
.small{color:#666;font-size:15px;line-height:1.6}
</style>
</head>

<body>
<div class="card" id="start">
<h1>國小五六年級英文聽力測驗</h1>
<p>題庫共 300 題，每次隨機抽 50 題，不重複。</p>
<input id="studentName" placeholder="請輸入姓名">
<input id="studentClass" placeholder="班級 / 隊名，可不填">
<button onclick="startExam()">開始測驗</button>
<p class="small">說明：每題請先按「🔊播放題目」，聽完後選答案。</p>
</div>

<div class="card hidden" id="exam">
<h1>英文聽力測驗</h1>
<div style="display:flex;justify-content:space-between;gap:10px;align-items:center">
<p id="info"></p>
<p class="timer" id="timer"></p>
</div>
<div class="tag" id="type"></div>
<button class="sound" onclick="speakQuestion()">🔊 播放題目</button>
<h2 id="question"></h2>
<div id="options"></div>
<button onclick="nextQuestion()">下一題</button>
<button class="secondary" onclick="finish()">提前交卷</button>
</div>

<div class="card hidden" id="result">
<h1>測驗結果</h1>
<div id="score"></div>
<h2>排行榜 Top 10</h2>
<div id="ranking"></div>
<h2>錯題檢討</h2>
<div id="review"></div>
<button onclick="location.reload()">重新測驗</button>
</div>

<script>
let bank=[];
let questions=[];
let current=0;
let answers=[];
let time=60*60;
let timer=null;

function shuffle(arr){
  return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]);
}

function addQuestion(type,listen,question,answer,options){
  bank.push({
    type:type,
    listen:listen,
    q:question,
    answer:answer,
    options:shuffle([...new Set(options)])
  });
}

const vocab=[
["usually","通常"],["important","重要的"],["weather","天氣"],["library","圖書館"],["museum","博物館"],
["station","車站"],["restaurant","餐廳"],["dictionary","字典"],["healthy","健康的"],["practice","練習"],
["exercise","運動"],["message","訊息"],["season","季節"],["center","中心"],["dangerous","危險的"],
["comfortable","舒服的"],["difficult","困難的"],["favorite","最喜愛的"],["careful","小心的"],["successful","成功的"],
["suddenly","突然地"],["holiday","假期"],["vegetable","蔬菜"],["medicine","藥"],["umbrella","雨傘"],
["borrow","借入"],["protect","保護"],["nervous","緊張的"],["traffic","交通"],["planet","行星"],
["notebook","筆記本"],["weekend","週末"],["grandparents","祖父母"],["breakfast","早餐"],["homework","作業"],
["swimming","游泳"],["basketball","籃球"],["birthday","生日"],["mountain","山"],["beach","海灘"],
["hospital","醫院"],["post office","郵局"],["supermarket","超市"],["airport","機場"],["classmate","同學"],
["neighbor","鄰居"],["firefighter","消防員"],["scientist","科學家"],["engineer","工程師"],["artist","藝術家"],
["quiet","安靜的"],["noisy","吵雜的"],["early","早的"],["late","遲到的"],["cheap","便宜的"],
["expensive","昂貴的"],["delicious","美味的"],["fresh","新鮮的"],["popular","受歡迎的"],["modern","現代的"],
["future","未來"],["history","歷史"],["culture","文化"],["nature","自然"],["environment","環境"],
["energy","能源"],["habit","習慣"],["fever","發燒"],["cough","咳嗽"],["headache","頭痛"],
["dentist","牙醫"],["ticket","票"],["schedule","時刻表"],["direction","方向"],["address","地址"],
["problem","問題"],["answer","答案"],["question","問題"],["example","例子"],["reason","原因"]
];

vocab.forEach(v=>{
  addQuestion("單字聽力",`What does ${v[0]} mean?`,`What does "${v[0]}" mean?`,v[1],[v[1],"天氣","重要的","餐廳","練習","假期"]);
});

const grammar=[
["I ___ a student.","am",["am","is","are","be"]],
["She ___ my sister.","is",["am","is","are","be"]],
["They ___ my classmates.","are",["am","is","are","be"]],
["There ___ a book on the desk.","is",["is","are","am","be"]],
["There ___ many students in the classroom.","are",["is","are","am","be"]],
["Tom ___ to school by bus every day.","goes",["go","goes","going","went"]],
["I ___ my homework after dinner.","do",["do","does","doing","did"]],
["My brother ___ a new bike.","has",["have","has","had","having"]],
["She can ___ very well.","swim",["swim","swims","swimming","swam"]],
["Kevin enjoys ___ basketball.","playing",["play","plays","playing","played"]],
["This is ___ apple.","an",["a","an","the","some"]],
["That is ___ useful book.","a",["a","an","the","any"]],
["We went to the park ___ Sunday.","on",["in","on","at","for"]],
["I get up ___ seven o'clock.","at",["in","on","at","for"]],
["The cat is ___ the table.","under",["under","happy","before","because"]],
["The library is ___ the post office.","behind",["behind","between","during","never"]],
["Today is ___ than yesterday.","hotter",["hot","hotter","hottest","heat"]],
["This question is ___ than that one.","easier",["easy","easier","easiest","easily"]],
["Monday is the ___ day of the week.","first",["one","first","once","only"]],
["How ___ water do you drink?","much",["many","much","old","far"]],
["How ___ books do you have?","many",["many","much","old","far"]],
["I am tired, ___ I keep studying.","but",["but","because","so","or"]],
["It rained, ___ I stayed home.","so",["so","because","but","and"]],
["Please ___ your name on the paper.","write",["write","writes","writing","wrote"]],
["Don't forget ___ your umbrella.","to bring",["bring","to bring","bringing","brought"]],
["We should ___ the environment.","protect",["protect","protects","protected","protecting"]],
["She decided ___ at home.","to stay",["stay","to stay","staying","stayed"]],
["It is important ___ every day.","to practice",["practice","to practice","practicing","practiced"]]
];

for(let i=0;i<90;i++){
  const g=grammar[i%grammar.length];
  addQuestion("文法聽力",g[0],g[0],g[1],g[2]);
}

const dialogues=[
["A: What are you doing this weekend? B: I am going to visit my grandparents.","What will the boy do this weekend?","Visit his grandparents",["Visit his grandparents","Go swimming","Buy a book","Stay at school"]],
["A: Why are you late? B: I missed the bus.","Why is the girl late?","She missed the bus",["She missed the bus","She lost her bag","She was sick","She forgot homework"]],
["A: How often do you practice swimming? B: Three times a week.","How often does he practice swimming?","Three times a week",["Three times a week","Every day","Once a month","Never"]],
["A: What does your father do? B: He is a doctor.","What is his father?","A doctor",["A doctor","A teacher","A driver","A farmer"]],
["A: Where is the library? B: It is next to the post office.","Where is the library?","Next to the post office",["Next to the post office","Behind the park","In the museum","Near the beach"]],
["A: What is wrong? B: I have a headache.","What is wrong with the speaker?","A headache",["A headache","A fever","A cough","A toothache"]],
["A: What did Amy buy? B: She bought a new dictionary.","What did Amy buy?","A dictionary",["A dictionary","A notebook","A ticket","An umbrella"]],
["A: Which sport do you like best? B: I like swimming best.","Which sport does the speaker like best?","Swimming",["Swimming","Baseball","Basketball","Running"]],
["A: How much is the sandwich? B: It is fifty dollars.","How much is the sandwich?","Fifty dollars",["Fifty dollars","Fifteen dollars","Five dollars","Forty dollars"]],
["A: What is the weather like? B: It is cloudy and windy.","How is the weather?","Cloudy and windy",["Cloudy and windy","Sunny and hot","Rainy and cold","Snowy"]],
["A: When is your birthday? B: It is in July.","When is the birthday?","In July",["In July","In June","On Monday","At seven"]],
["A: How do you go to school? B: By bike.","How does the speaker go to school?","By bike",["By bike","By bus","On foot","By train"]],
["A: Why do you like English? B: Because it is useful.","Why does the speaker like English?","Because it is useful",["Because it is useful","Because it is hard","Because it is expensive","Because it is noisy"]],
["A: Can you swim? B: Yes, I can.","Can the speaker swim?","Yes, he can",["Yes, he can","No, he can't","He can sing","He can cook"]],
["A: What day is today? B: It is Wednesday.","What day is today?","Wednesday",["Wednesday","Monday","Friday","Sunday"]]
];

for(let i=0;i<75;i++){
  const d=dialogues[i%dialogues.length];
  addQuestion("對話聽力",d[0],d[1],d[2],d[3]);
}

const readings=[
{
text:"Tom is eleven years old. He likes swimming and practices every Saturday morning. His dream is to join a school swimming team.",
qs:[
["How old is Tom?","Eleven",["Eleven","Ten","Twelve","Thirteen"]],
["What sport does Tom like?","Swimming",["Swimming","Running","Basketball","Baseball"]],
["When does he practice?","Every Saturday morning",["Every Saturday morning","Every Sunday night","After dinner","At school"]],
["What is his dream?","To join a school swimming team",["To join a school swimming team","To be a doctor","To buy a bike","To visit Japan"]]
]
},
{
text:"Amy has a small dog named Coco. Coco is black and very friendly. Amy walks Coco in the park after school.",
qs:[
["What pet does Amy have?","A dog",["A dog","A cat","A bird","A rabbit"]],
["What is the dog's name?","Coco",["Coco","Lucky","Black","Amy"]],
["What color is Coco?","Black",["Black","White","Brown","Yellow"]],
["Where does Amy walk Coco?","In the park",["In the park","At school","In the library","At home"]]
]
},
{
text:"Ben went to the science museum with his classmates. They learned about planets and space. Ben wrote many notes in his notebook.",
qs:[
["Where did Ben go?","The science museum",["The science museum","The zoo","The beach","The station"]],
["Who went with Ben?","His classmates",["His classmates","His parents","His brother","His teacher only"]],
["What did they learn about?","Planets and space",["Planets and space","Food and health","Music and art","Animals"]],
["Where did Ben write notes?","In his notebook",["In his notebook","On the wall","On a ticket","In a dictionary"]]
]
},
{
text:"Grace wants to stay healthy. She eats vegetables every day and exercises in the park every weekend.",
qs:[
["What does Grace want?","To stay healthy",["To stay healthy","To buy a dog","To visit a museum","To learn music"]],
["What does she eat every day?","Vegetables",["Vegetables","Candy","Cake","Hamburgers"]],
["Where does she exercise?","In the park",["In the park","In the library","At the station","At the restaurant"]],
["How often does she exercise there?","Every weekend",["Every weekend","Every night","Once a year","Never"]]
]
},
{
text:"Ruby saves money to buy a dictionary. She thinks a dictionary is useful because it helps her learn new words.",
qs:[
["What does Ruby save money to buy?","A dictionary",["A dictionary","A ticket","A dress","A sandwich"]],
["Why is it useful?","It helps her learn new words",["It helps her learn new words","It is cheap","It is small","It is red"]],
["What does Ruby learn?","New words",["New words","New songs","New games","New sports"]],
["What does Ruby do with money?","Saves it",["Saves it","Throws it away","Loses it","Gives it to a dog"]]
]
}
];

for(let i=0;i<55;i++){
  const r=readings[i%readings.length];
  const item=r.qs[i%r.qs.length];
  addQuestion("短文聽力",r.text, item[0], item[1], item[2]);
}

while(bank.length<300){
  const n=bank.length+1;
  addQuestion("生活聽力",
  `This is listening question number ${n}. Please choose the best answer.`,
  `Listening question number ${n}. What should you do?`,
  "Choose the best answer",
  ["Choose the best answer","Close the book","Go to sleep","Play games"]);
}

bank=bank.slice(0,300);

function startExam(){
  const name=document.getElementById("studentName").value.trim();
  if(!name){alert("請先輸入姓名");return}
  questions=shuffle(bank.slice()).slice(0,50);
  answers=[];
  current=0;
  time=60*60;
  document.getElementById("start").classList.add("hidden");
  document.getElementById("exam").classList.remove("hidden");
  showQuestion();
  timer=setInterval(function(){
    time--;
    const m=Math.floor(time/60);
    const s=time%60;
    document.getElementById("timer").innerText="剩餘時間："+m+":"+(s<10?"0":"")+s;
    if(time<=0)finish();
  },1000);
}

function showQuestion(){
  const q=questions[current];
  document.getElementById("info").innerText="第 "+(current+1)+" / "+questions.length+" 題";
  document.getElementById("type").innerText=q.type;
  document.getElementById("question").innerText=q.q;
  let html="";
  shuffle(q.options.slice()).forEach(function(opt){
    html+=`<label class="option"><input type="radio" name="ans" value="${opt}">${opt}</label>`;
  });
  document.getElementById("options").innerHTML=html;
}

function speakQuestion(){
  const q=questions[current];
  speechSynthesis.cancel();
  const text=q.listen+" Question: "+q.q;
  const msg=new SpeechSynthesisUtterance(text);
  msg.lang="en-US";
  msg.rate=0.85;
  msg.pitch=1;
  speechSynthesis.speak(msg);
}

function nextQuestion(){
  const selected=document.querySelector('input[name="ans"]:checked');
  answers[current]=selected?selected.value:"未作答";
  current++;
  if(current>=questions.length)finish();
  else showQuestion();
}

function finish(){
  if(timer)clearInterval(timer);
  document.getElementById("exam").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let correct=0;
  let review="";
  questions.forEach(function(q,i){
    const user=answers[i]||"未作答";
    if(user===q.answer)correct++;
    else{
      review+=`<div class="review"><b>第${i+1}題</b><br>${q.q}<br>你的答案：${user}<br>正確答案：${q.answer}</div>`;
    }
  });

  const percent=Math.round(correct/questions.length*100);
  const name=document.getElementById("studentName").value.trim();
  const cls=document.getElementById("studentClass").value.trim();
  const date=new Date().toLocaleString();

  document.getElementById("score").innerHTML=
  `<h2>${name} ${cls?("｜"+cls):""}</h2>
  <h2>分數：${percent} 分</h2>
  <p>答對：${correct} / ${questions.length}</p>
  <p>完成時間：${date}</p>`;

  saveRank({name,cls,percent,correct,total:questions.length,date});
  showRank();
  document.getElementById("review").innerHTML=review || "<p>全部答對，太棒了！</p>";
}

function saveRank(data){
  const key="englishListeningRank";
  const old=JSON.parse(localStorage.getItem(key)||"[]");
  old.push(data);
  old.sort((a,b)=>b.percent-a.percent || b.correct-a.correct);
  localStorage.setItem(key,JSON.stringify(old.slice(0,10)));
}

function showRank(){
  const key="englishListeningRank";
  const list=JSON.parse(localStorage.getItem(key)||"[]");
  let html="";
  list.forEach(function(r,i){
    html+=`<div class="rank">${i+1}. ${r.name} ${r.cls?("｜"+r.cls):""}｜${r.percent}分｜${r.correct}/${r.total}<br><small>${r.date}</small></div>`;
  });
  document.getElementById("ranking").innerHTML=html || "<p>目前沒有排行榜資料</p>";
}
</script>
</body>
</html>
