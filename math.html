<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五下數學期末複習｜翰林版</title>
<style>
body{font-family:Arial,"Microsoft JhengHei",sans-serif;background:#f4f7fb;margin:0;color:#222}
header{background:#0b6bcb;color:white;padding:18px;text-align:center}
.container{max-width:900px;margin:auto;padding:16px}
.card{background:white;border-radius:14px;padding:16px;margin:14px 0;box-shadow:0 3px 10px #0001}
button{background:#0b6bcb;color:white;border:0;border-radius:10px;padding:12px 18px;font-size:16px;margin:6px 4px}
button.secondary{background:#666}
button.danger{background:#c62828}
.option{display:block;margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:10px}
input,select{width:95%;padding:10px;font-size:16px;border:1px solid #aaa;border-radius:8px}
.timer{font-size:22px;font-weight:bold;color:#c62828}
.correct{color:#138a36;font-weight:bold}
.wrong{color:#c62828;font-weight:bold}
.small{color:#666;font-size:14px}
.hide{display:none}
</style>
</head>
<body>

<header>
<h1>五年級下學期數學期末複習</h1>
<p>翰林版｜300+題庫｜隨機出題｜錯題複習</p>
</header>

<div class="container">

<div id="startBox" class="card">
<h2>選擇測驗模式</h2>
<p>模擬考：隨機50題，限時40分鐘。</p>
<p>單元練習：可選單元，隨機20題。</p>

<select id="mode">
<option value="exam">模擬考：隨機50題｜40分鐘</option>
<option value="volume">單元練習：體積與容積</option>
<option value="surface">單元練習：表面積</option>
<option value="fraction">單元練習：分數乘除</option>
<option value="decimal">單元練習：小數乘除</option>
<option value="average">單元練習：平均數</option>
<option value="speed">單元練習：速率</option>
<option value="wrong">錯題複習</option>
</select>

<br><br>
<button onclick="startTest()">開始測驗</button>
<button class="danger" onclick="clearWrong()">清除錯題紀錄</button>
</div>

<div id="quizBox" class="hide">
<div class="card">
<div class="timer">剩餘時間：<span id="timer">40:00</span></div>
<div class="small">每題2分，完成後請按最下方交卷。</div>
</div>
<form id="quizForm"></form>
<button onclick="submitTest()">交卷</button>
</div>

<div id="resultBox" class="hide card"></div>
<div id="reviewBox" class="hide"></div>

</div>

<script>
let questionBank=[];
let selected=[];
let wrongList=[];
let timerInterval;
let timeLeft=40*60;

function add(cat,type,q,a,ex,options=[]){
 questionBank.push({cat,type,q,a,ex,options});
}

function buildQuestions(){

for(let l=4;l<=14;l++){
 for(let w=3;w<=10;w++){
  let h=(l+w)%8+3;
  add("volume","input",`長方體長${l}公分、寬${w}公分、高${h}公分，體積是多少立方公分？`,[String(l*w*h)],`體積=長×寬×高=${l}×${w}×${h}=${l*w*h}`);
 }
}

for(let a=3;a<=12;a++){
 add("volume","input",`正方體邊長${a}公分，體積是多少立方公分？`,[String(a*a*a)],`正方體體積=邊長×邊長×邊長=${a}×${a}×${a}=${a*a*a}`);
}

for(let ml=1000;ml<=9000;ml+=500){
 add("volume","input",`${ml}毫升等於幾公升？`,[String(ml/1000)],`${ml}÷1000=${ml/1000}公升`);
}

for(let l=1;l<=9;l++){
 add("volume","input",`${l}.5公升等於幾毫升？`,[String(l*1000+500)],`${l}.5×1000=${l*1000+500}毫升`);
}

for(let l=5;l<=15;l++){
 for(let w=3;w<=9;w+=2){
  let h=4;
  let ans=(l*w+l*h+w*h)*2;
  add("surface","input",`長方體長${l}公分、寬${w}公分、高${h}公分，表面積是多少平方公分？`,[String(ans)],`表面積=(長×寬+長×高+寬×高)×2=(${l*w}+${l*h}+${w*h})×2=${ans}`);
 }
}

for(let a=3;a<=15;a++){
 add("surface","input",`正方體邊長${a}公分，表面積是多少平方公分？`,[String(a*a*6)],`正方體表面積=邊長×邊長×6=${a}×${a}×6=${a*a*6}`);
}

for(let n=12;n<=96;n+=6){
 add("fraction","input",`${n}的1/3是多少？`,[String(n/3)],`${n}×1/3=${n/3}`);
 add("fraction","input",`${n}的1/4是多少？`,[String(n/4)],`${n}×1/4=${n/4}`);
}

for(let n=10;n<=90;n+=5){
 add("fraction","input",`${n}的2/5是多少？`,[String(n*2/5)],`${n}×2/5=${n*2/5}`);
}

let fracSet=[
["1/2","1/4","2"],["2/3","1/3","2"],["3/4","1/4","3"],
["2/5","1/5","2"],["5/6","1/6","5"],["3/8","1/8","3"]
];
fracSet.forEach(f=>{
 add("fraction","choice",`${f[0]} ÷ ${f[1]} = ?`,f[2],`除以分數等於乘以倒數。`,[f[2],"1","4","6"]);
});

for(let a=2;a<=9;a++){
 for(let b=2;b<=9;b++){
  let x=(a/10).toFixed(1);
  let y=(b/10).toFixed(1);
  let ans=(x*y).toFixed(2).replace(/0$/,"");
  add("decimal","input",`${x} × ${y} = ?`,[ans],`${x}×${y}=${ans}`);
 }
}

for(let a=12;a<=96;a+=6){
 let b=0.6;
 let ans=a/10/b;
 add("decimal","input",`${(a/10).toFixed(1)} ÷ 0.6 = ?`,[String(Number(ans.toFixed(2)))],`小數除法可同乘10再計算。`);
}

for(let a=60;a<=200;a+=10){
 let b=5;
 add("average","input",`${b}個數的總和是${a}，平均數是多少？`,[String(a/b)],`平均數=總和÷個數=${a}÷${b}=${a/b}`);
}

for(let avg=60;avg<=100;avg+=5){
 add("average","input",`4次測驗平均${avg}分，總分是多少？`,[String(avg*4)],`總分=平均×次數=${avg}×4=${avg*4}`);
}

for(let d=60;d<=300;d+=30){
 for(let t=2;t<=5;t++){
  add("speed","input",`${t}小時行駛${d}公里，平均時速是多少公里？`,[String(d/t)],`速率=距離÷時間=${d}÷${t}=${d/t}`);
 }
}

for(let s=30;s<=90;s+=10){
 for(let t=2;t<=5;t++){
  add("speed","input",`時速${s}公里，行駛${t}小時，共走幾公里？`,[String(s*t)],`距離=速率×時間=${s}×${t}=${s*t}`);
 }
}

add("volume","choice","1立方公分等於多少毫升？","1","1立方公分=1毫升。",["1","10","100","1000"]);
add("volume","choice","1公升等於多少毫升？","1000","1公升=1000毫升。",["10","100","1000","10000"]);
add("surface","choice","正方體有幾個面？","6","正方體有6個面。",["4","5","6","8"]);
add("surface","choice","長方體表面積公式是哪一個？","(長×寬+長×高+寬×高)×2","長方體有三組相對面。",["長×寬×高","(長×寬+長×高+寬×高)×2","長+寬+高","長×寬"]);
add("average","choice","平均數的算法是？","總和÷個數","平均數=總和÷個數。",["總和×個數","總和÷個數","個數÷總和","最大值÷最小值"]);
add("speed","choice","速率的算法是？","距離÷時間","速率=距離÷時間。",["距離×時間","距離÷時間","時間÷距離","速率×時間"]);
}

buildQuestions();

function shuffle(arr){
 return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]);
}

function startTest(){
 let mode=document.getElementById("mode").value;
 let pool=[];
 let count=50;
 timeLeft=40*60;

 if(mode==="exam"){
  pool=questionBank;
  count=50;
 }else if(mode==="wrong"){
  pool=JSON.parse(localStorage.getItem("mathWrong")||"[]");
  count=Math.min(30,pool.length);
  timeLeft=30*60;
  if(pool.length===0){alert("目前沒有錯題紀錄");return;}
 }else{
  pool=questionBank.filter(q=>q.cat===mode);
  count=20;
  timeLeft=20*60;
 }

 selected=shuffle(pool).slice(0,count);
 document.getElementById("startBox").classList.add("hide");
 document.getElementById("quizBox").classList.remove("hide");
 document.getElementById("resultBox").classList.add("hide");
 document.getElementById("reviewBox").classList.add("hide");
 renderQuiz();
 startTimer();
}

function renderQuiz(){
 const form=document.getElementById("quizForm");
 form.innerHTML="";
 selected.forEach((item,i)=>{
  let html=`<div class="card"><h3>第${i+1}題</h3><p>${item.q}</p>`;
  if(item.type==="choice"){
   shuffle(item.options).forEach(op=>{
    html+=`<label class="option"><input type="radio" name="q${i}" value="${op}"> ${op}</label>`;
   });
  }else{
   html+=`<input type="text" name="q${i}" placeholder="請輸入答案，例如：30、0.8、5/8">`;
  }
  html+=`</div>`;
  form.innerHTML+=html;
 });
}

function startTimer(){
 clearInterval(timerInterval);
 updateTimer();
 timerInterval=setInterval(()=>{
  timeLeft--;
  updateTimer();
  if(timeLeft<=0){
   clearInterval(timerInterval);
   submitTest();
  }
 },1000);
}

function updateTimer(){
 let m=Math.floor(timeLeft/60);
 let s=timeLeft%60;
 document.getElementById("timer").textContent=`${m}:${s<10?"0"+s:s}`;
}

function cleanAns(v){
 return String(v||"").replace(/\s/g,"").replace("：",":").replace("／","/").toLowerCase();
}

function submitTest(){
 clearInterval(timerInterval);
 let score=0;
 wrongList=[];
 selected.forEach((item,i)=>{
  let user="";
  if(item.type==="choice"){
   let checked=document.querySelector(`input[name="q${i}"]:checked`);
   user=checked?checked.value:"";
   if(user===item.a) score+=2;
   else wrongList.push({no:i+1,item,user:user||"未作答"});
  }else{
   let input=document.querySelector(`input[name="q${i}"]`);
   user=input?input.value:"";
   let ok=item.a.some(ans=>cleanAns(ans)===cleanAns(user));
   if(ok) score+=2;
   else wrongList.push({no:i+1,item,user:user||"未作答"});
  }
 });

 saveWrong();
 showResult(score);
}

function saveWrong(){
 let old=JSON.parse(localStorage.getItem("mathWrong")||"[]");
 wrongList.forEach(w=>old.push(w.item));
 let unique=[];
 let seen=new Set();
 old.forEach(q=>{
  if(!seen.has(q.q)){
   seen.add(q.q);
   unique.push(q);
  }
 });
 localStorage.setItem("mathWrong",JSON.stringify(unique.slice(-100)));
}

function showResult(score){
 document.getElementById("quizBox").classList.add("hide");
 const result=document.getElementById("resultBox");
 result.classList.remove("hide");

 let total=selected.length*2;
 let percent=Math.round(score/total*100);
 let level=percent>=90?"非常優秀":percent>=80?"表現良好":percent>=70?"還不錯":percent>=60?"需要加強":"建議重新複習";

 result.innerHTML=`
 <h2>測驗完成</h2>
 <p style="font-size:28px;font-weight:bold">成績：${score} / ${total}</p>
 <p>換算百分制：${percent}分</p>
 <p>評語：${level}</p>
 <p>錯題數：${wrongList.length} 題</p>
 <button onclick="showWrong()">錯題複習</button>
 <button class="secondary" onclick="location.reload()">重新測驗</button>
 `;
}

function showWrong(){
 const box=document.getElementById("reviewBox");
 box.classList.remove("hide");

 if(wrongList.length===0){
  box.innerHTML=`<div class="card"><h2 class="correct">全部答對！太強了！</h2></div>`;
  return;
 }

 let html=`<div class="card"><h2>錯題複習</h2></div>`;
 wrongList.forEach(w=>{
  let ans=Array.isArray(w.item.a)?w.item.a[0]:w.item.a;
  html+=`
  <div class="card">
   <h3>第${w.no}題</h3>
   <p>${w.item.q}</p>
   <p class="wrong">你的答案：${w.user}</p>
   <p class="correct">正確答案：${ans}</p>
   <p>解析：${w.item.ex}</p>
  </div>`;
 });

 box.innerHTML=html;
 window.scrollTo(0,document.body.scrollHeight);
}

function clearWrong(){
 localStorage.removeItem("mathWrong");
 alert("錯題紀錄已清除");
}
</script>

</body>
</html>
